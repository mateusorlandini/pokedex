<section class="login-shell">
  <div class="login-card">
    <p class="login-brand">Pokédex</p>
    <h1 class="login-title">Sign in</h1>
    <p class="login-subtitle">Welcome back, trainer. Enter your credentials to continue.</p>

    <form class="login-form" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="login-field">
        <label class="login-label" for="login-email">Email</label>
        <input
          id="login-email"
          class="login-input"
          type="email"
          autocomplete="email"
          formControlName="email"
          placeholder="trainer@pokedex.com"
          [class.login-input--error]="showError('email')"
        />
        @if (showError('email')) {
          <p class="login-error">{{ errorMessage('email') }}</p>
        }
      </div>

      <div class="login-field">
        <label class="login-label" for="login-password">Password</label>
        <div class="login-input-wrap">
          <input
            id="login-password"
            class="login-input login-input--with-action"
            [type]="showPassword() ? 'text' : 'password'"
            autocomplete="current-password"
            formControlName="password"
            placeholder="••••••••"
            [class.login-input--error]="showError('password')"
          />
          <button
            type="button"
            class="login-input-action"
            (click)="togglePassword()"
            [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
          >
            {{ showPassword() ? 'Hide' : 'Show' }}
          </button>
        </div>
        @if (showError('password')) {
          <p class="login-error">{{ errorMessage('password') }}</p>
        }
      </div>

      <button
        type="submit"
        class="login-submit"
        [disabled]="form.invalid || isSubmitting()"
      >
        {{ isSubmitting() ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>

    <p class="login-footer">
      No account?
      <button type="button" class="login-link" (click)="onRegister()">Register</button>
    </p>
  </div>
</section>
