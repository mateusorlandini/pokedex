<header class="pokedex-header">
  <div class="pokedex-header__glow"></div>
  <div class="pokedex-header__content">
    <div class="pokedex-header__brand">
      <div class="pokedex-header__logo">
        <span class="pokedex-header__ball"></span>
        <span class="pokedex-header__title">Poke</span>
        <span class="pokedex-header__title pokedex-header__title--accent">Dex</span>
      </div>
      <p class="pokedex-header__subtitle">
        Uma Pokedex cheia de Pokemons, pronta para capturar, comparar e evoluir seu time.
      </p>
      <div class="pokedex-header__actions">
        <button class="pokedex-header__button pokedex-header__button--ghost" type="button">
          Ver favoritos
        </button>
      </div>
    </div>
  </div>
</header>
