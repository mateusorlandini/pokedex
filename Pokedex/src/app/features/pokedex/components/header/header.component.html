<header class="header">
  <div class="header__top">
    <div class="header__brand">
      <div class="header__logo">
        <svg class="header__pokeball" viewBox="0 0 100 100" aria-hidden="true">
          <circle cx="50" cy="50" r="48" fill="none" stroke="currentColor" stroke-width="4"/>
          <path d="M2 50 H98" stroke="currentColor" stroke-width="4"/>
          <circle cx="50" cy="50" r="16" fill="none" stroke="currentColor" stroke-width="4"/>
          <circle cx="50" cy="50" r="8" fill="currentColor"/>
        </svg>
        <h1 class="header__title">
          Pokédex
        </h1>
      </div>
      <p class="header__subtitle">
        Explore {{ totalCount }} Pokémon — discover stats, abilities &amp; evolutions
      </p>
    </div>

    <div class="header__actions">
      <button
        class="header__theme-toggle"
        type="button"
        (click)="themeService.toggle()"
        [attr.aria-label]="themeService.theme() === 'dark' ? 'Ativar tema claro' : 'Ativar tema escuro'"
      >
        @if (themeService.theme() === 'dark') {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        } @else {
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        }
      </button>
    </div>
  </div>

  <div class="header__controls">
    <div class="header__search">
      <svg class="header__search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input
        class="header__search-input"
        type="search"
        placeholder="Search by name or number..."
        (input)="onSearch($event)"
        autocomplete="off"
      />
    </div>

    <button
      class="header__filter-btn"
      [class.header__filter-btn--active]="showFavoritesOnly"
      type="button"
      (click)="onToggleFavorites()"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      <span>Favorites</span>
      @if (favoritesService.count() > 0) {
        <span class="header__badge">{{ favoritesService.count() }}</span>
      }
    </button>
  </div>
</header>
